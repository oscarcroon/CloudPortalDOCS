name: deploy

# Builds the static site on GitHub's runners (fast, generous resources) and
# deploys it to Cloudflare Workers via wrangler. This replaces Cloudflare's own
# "Workers Builds" Git integration, which times out building the heavy
# Docus/Nuxt UI site in its constrained container.
#
# Required repo secrets: CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
# Token permission: Account → Workers Scripts: Edit
# (no Workers Routes needed — the custom hostname route is managed in the dashboard)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build static site
        run: npm run generate
        env:
          NUXT_PUBLIC_SITE_URL: https://docs.coreit.cloud
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Static-assets Workers (assets-only, no `main`) require Wrangler v4.
          # Without this the action defaults to v3, which errors "Missing entry-point".
          wranglerVersion: "4"
          command: deploy
