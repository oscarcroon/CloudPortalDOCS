name: docs-i18n-check

# Runs on every PR (including from forks) WITHOUT secrets — safe for untrusted code.
on:
  pull_request:
    paths:
      - 'content/**'
      - 'scripts/i18n-check.mjs'
      - 'scripts/gen-docs-map.mjs'
      - 'scripts/link-check.mjs'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No dependencies needed — the checks are pure Node.
      - name: Check i18n parity, frontmatter and forbidden terms
        run: node scripts/i18n-check.mjs
      - name: Check docs-map (portalRoute parity, no duplicate routes)
        run: node scripts/gen-docs-map.mjs --check
      - name: Check internal links resolve
        run: node scripts/link-check.mjs
